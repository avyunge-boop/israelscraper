# Build root Dockerfile, push to Artifact Registry, deploy to Cloud Run.
#
# Prereqs: Artifact Registry repo exists (e.g. cloud-run-source-deploy in the region).
# Run from repo root:
#   gcloud builds submit --config=cloudbuild.yaml --project=YOUR_PROJECT_ID .
#
# Override service/region:
#   gcloud builds submit --config=cloudbuild.yaml --substitutions=_REGION=me-west1,_SERVICE=scraper-api .

substitutions:
  _REGION: me-west1
  _SERVICE: scraper-api
  _AR_REPO: cloud-run-source-deploy

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE}:${BUILD_ID}
      - -f
      - Dockerfile
      - .

  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE}:${BUILD_ID}
    waitFor:
      - build

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE}:${BUILD_ID}
      - --region=${_REGION}
      - --platform=managed
      - --project=${PROJECT_ID}
      - --quiet
    waitFor:
      - push
