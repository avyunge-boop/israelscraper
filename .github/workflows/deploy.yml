# Build container and deploy to Cloud Run. Configure GitHub secrets:
#   GCP_WORKLOAD_IDENTITY_PROVIDER  (for OIDC auth)
#   GCP_SERVICE_ACCOUNT_EMAIL
# Optional: GCP_REGION (default us-central1), CLOUD_RUN_SERVICE (default israel-scraper)
name: Deploy scraper to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  GCP_PROJECT_ID: project-36c1b4ff-df0f-4c13-883
  GCS_BUCKET_NAME: israelscraper
  GCP_REGION: us-central1
  CLOUD_RUN_SERVICE: israel-scraper

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/cloud-run-source-deploy/${{ env.CLOUD_RUN_SERVICE }}:${{ github.sha }}"
          docker build -t "$IMAGE" -f Dockerfile .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${{ env.CLOUD_RUN_SERVICE }}" \
            --image "$IMAGE" \
            --region "${{ env.GCP_REGION }}" \
            --project "${{ env.GCP_PROJECT_ID }}" \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "SCRAPER_STORAGE=gcs,GCS_BUCKET_NAME=${{ env.GCS_BUCKET_NAME }},GCP_PROJECT_ID=${{ env.GCP_PROJECT_ID }}" \
            --memory 2Gi \
            --timeout 3600 \
            --cpu 2
